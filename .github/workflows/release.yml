name: Publish to PyPI

on:
  push:
    tags: ['v*']

permissions:
  id-token: write
  contents: read

jobs:
  build:
    # Skip on the template repo itself (no pyproject.toml until instantiated)
    if: github.repository != 'DazzleTools/git-repokit-template'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: python -m build

    - name: Check package
      run: |
        pip install twine
        twine check dist/*

    - uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/

  publish:
    needs: build
    # Gated off until a PyPI trusted publisher is configured. Set repo variable
    # PYPI_PUBLISH=true to enable publishing on tag push. Until then, tagging a
    # release builds + checks the package but does not attempt to publish.
    if: vars.PYPI_PUBLISH == 'true'
    runs-on: ubuntu-latest
    environment: pypi

    permissions:
      id-token: write

    steps:
    - uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
